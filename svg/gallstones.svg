<svg class="anatomy-svg" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#eddcc8"/></linearGradient>
    <linearGradient id="liver-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c94f4f"/><stop offset="100%" stop-color="#a63a3a"/></linearGradient>
    <linearGradient id="gb-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6b8e23"/><stop offset="100%" stop-color="#556b2f"/></linearGradient>
    <linearGradient id="duct" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#daa520"/></linearGradient>
    <linearGradient id="bone-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e8ddd0"/><stop offset="100%" stop-color="#d4c8b8"/></linearGradient>
    <linearGradient id="stone-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d4a843"/><stop offset="50%" stop-color="#b8860b"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
    <linearGradient id="pancreas-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f0c8a0"/><stop offset="100%" stop-color="#e0b080"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7e6e"/>
    </marker>
  </defs>

  <!-- Body outline, torso, right upper quadrant -->
  <path d="M80,40 C60,45 45,60 40,85 L35,130 C32,165 30,200 32,235 L35,280 C38,310 42,330 50,345 L65,365 L80,380 L95,390 L110,395 L130,398 L150,395 L170,388 L185,378 L195,365 L202,350 L206,332 L208,310 L210,285 L212,255 L214,220 L215,185 L214,150 L212,120 L210,95 L208,75 L202,60 L195,50 L185,44 L170,40 L150,38 L130,39 L110,40 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.2"/>

  <!-- Rib cage hints (ghosted) -->
  <path d="M80,100 C90,95 100,92 115,90" fill="none" stroke="url(#bone-grad)" stroke-width="2" opacity="0.3"/>
  <path d="M72,130 C85,124 100,120 120,118" fill="none" stroke="url(#bone-grad)" stroke-width="2" opacity="0.3"/>
  <path d="M68,160 C82,153 100,148 125,145" fill="none" stroke="url(#bone-grad)" stroke-width="2" opacity="0.3"/>
  <path d="M65,190 C80,182 100,176 128,172" fill="none" stroke="url(#bone-grad)" stroke-width="2" opacity="0.3"/>

  <!-- ═══════════ LIVER ═══════════ -->
  <path d="M150,45 C170,42 190,44 210,50 C240,60 265,78 280,102 C292,122 298,145 295,168 C290,195 278,215 260,230 C245,242 225,250 205,252 C190,253 175,250 165,245 C155,240 148,232 142,222 C136,210 132,195 130,178 C128,160 128,142 130,125 C133,108 138,92 145,78 C148,70 150,58 150,45 Z"
        fill="url(#liver-grad)" stroke="#8b3030" stroke-width="1.5" opacity="0.35"/>

  <!-- Liver capsule outline -->
  <path d="M150,45 C170,42 190,44 210,50 C240,60 265,78 280,102 C292,122 298,145 295,168 C290,195 278,215 260,230 C245,242 225,250 205,252 C190,253 175,250 165,245 C155,240 148,232 142,222 C136,210 132,195 130,178 C128,160 128,142 130,125 C133,108 138,92 145,78 C148,70 150,58 150,45 Z"
        fill="none" stroke="#8b3030" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,2"/>

  <text x="270" y="65" fill="#8b3030" font-size="12" font-weight="600" font-style="italic">Liver</text>
  <text x="270" y="78" fill="#8b3030" font-size="9" font-style="italic">(right lobe)</text>

  <!-- ═══════════ PANCREAS ═══════════ -->
  <path d="M85,355 C100,348 120,340 145,335 C170,330 195,328 220,330 C245,332 265,338 280,348 C290,355 295,365 292,375 C288,385 278,392 262,395 C245,398 225,398 205,395 C185,392 165,386 150,378 C135,370 120,362 108,358 C98,356 92,358 88,362 C84,366 82,372 84,378 C86,384 92,388 100,390 L108,392"
        fill="url(#pancreas-grad)" stroke="#c4a070" stroke-width="1.5" opacity="0.6"/>

  <text x="140" y="378" fill="#a07840" font-size="10" font-style="italic">Pancreas</text>

  <!-- ═══════════ GALLBLADDER ═══════════ -->
  <!-- Fundus (bottom bulb) -->
  <ellipse cx="190" cy="245" rx="28" ry="35" fill="url(#gb-grad)" stroke="#3a4a1a" stroke-width="1.5" opacity="0.85"/>

  <!-- Body -->
  <path d="M168,218 C172,200 180,185 188,175 C196,168 205,165 210,168 C214,172 215,178 213,185 C210,195 205,208 200,218"
        fill="url(#gb-grad)" stroke="#3a4a1a" stroke-width="1.5" opacity="0.85"/>

  <!-- Neck / infundibulum (Hartmann's pouch) -->
  <path d="M210,168 C216,162 222,158 228,158 C234,158 238,162 238,168 C238,175 234,180 228,182 C222,184 216,182 213,185"
        fill="url(#gb-grad)" stroke="#3a4a1a" stroke-width="1.5" opacity="0.85"/>

  <!-- Gallstone inside gallbladder -->
  <ellipse cx="192" cy="250" rx="8" ry="7" fill="url(#stone-grad)" stroke="#6b4410" stroke-width="1" opacity="0.9"/>
  <ellipse cx="192" cy="250" rx="4" ry="3" fill="#d4a843" opacity="0.4"/>

  <!-- Second smaller stone -->
  <circle cx="182" cy="240" r="4" fill="url(#stone-grad)" stroke="#6b4410" stroke-width="0.8" opacity="0.85"/>

  <!-- Label: Gallbladder -->
  <text x="148" y="205" fill="#3a4a1a" font-size="11" font-weight="600">Gallbladder</text>
  <!-- Label line -->
  <line x1="163" y1="210" x2="148" y2="205" stroke="#3a4a1a" stroke-width="0.8" opacity="0.6"/>

  <!-- ═══════════ BILE DUCTS ═══════════ -->

  <!-- Cystic duct (gallbladder → common bile duct) -->
  <path d="M238,168 C245,165 252,162 258,160 C264,158 270,158 275,160 C280,162 282,166 282,172"
        fill="none" stroke="url(#duct)" stroke-width="3.5" stroke-linecap="round" filter="url(#soft)"/>

  <!-- Common hepatic duct (from liver → convergence) -->
  <path d="M215,140 C225,135 240,132 255,133 C270,134 280,138 285,145 C288,150 288,158 285,165 C282,170 278,172 275,172"
        fill="none" stroke="url(#duct)" stroke-width="3.5" stroke-linecap="round" filter="url(#soft)" opacity="0.7"/>

  <!-- Right and left hepatic ducts (from within liver) -->
  <path d="M220,100 C225,110 230,120 240,130 C248,138 258,140 270,138 C278,136 282,133 285,145"
        fill="none" stroke="url(#duct)" stroke-width="2.5" stroke-linecap="round" filter="url(#soft)" opacity="0.5"/>
  <path d="M200,95 C205,105 210,118 220,130"
        fill="none" stroke="url(#duct)" stroke-width="2" stroke-linecap="round" filter="url(#soft)" opacity="0.5"/>

  <!-- Common bile duct (runs from convergence down behind pancreas) -->
  <path d="M282,172 C285,178 288,185 290,195 C292,210 292,228 290,245 C288,260 285,278 280,295 C275,310 268,325 260,340 C255,350 252,358 250,365"
        fill="none" stroke="url(#duct)" stroke-width="4" stroke-linecap="round" filter="url(#soft)"/>

  <!-- Stone stuck in cystic duct (cause of obstruction) -->
  <ellipse cx="262" cy="162" rx="6" ry="5.5" fill="url(#stone-grad)" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="2,1" opacity="0.95"/>
  <!-- Obstruction marker lines -->
  <line x1="256" y1="157" x2="256" y2="167" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
  <line x1="268" y1="157" x2="268" y2="167" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>

  <!-- ═══════════ DUODENUM ═══════════ -->
  <path d="M300,280 C310,275 325,272 340,275 C355,278 365,285 370,296 C375,308 372,322 365,335 C358,348 348,356 335,360 C322,364 310,362 302,355 C296,350 295,342 298,335 C301,328 306,325 312,325 C318,325 322,330 324,336"
        fill="none" stroke="#a08060" stroke-width="2.5" stroke-linecap="round" opacity="0.5" stroke-dasharray="4,2"/>

  <!-- Ampulla of Vater (CBD + pancreatic duct meet duodenum) -->
  <circle cx="290" cy="358" r="4" fill="#daa520" stroke="#a08060" stroke-width="1" opacity="0.7"/>
  <!-- Pancreatic duct joining -->
  <path d="M250,365 C260,363 270,362 280,360 C286,358 288,358 290,358"
        fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <text x="320" y="275" fill="#a08060" font-size="9" font-style="italic">Duodenum</text>

  <!-- ═══════════ LABELS ═══════════ -->

  <!-- Common hepatic duct label -->
  <text x="295" y="148" fill="#b8860b" font-size="9" font-weight="600">Common</text>
  <text x="295" y="159" fill="#b8860b" font-size="9" font-weight="600">hepatic duct</text>

  <!-- Cystic duct label -->
  <text x="240" y="178" fill="#b8860b" font-size="9" font-weight="600">Cystic duct</text>

  <!-- Common bile duct label -->
  <text x="295" y="230" fill="#b8860b" font-size="9" font-weight="600">Common bile</text>
  <text x="295" y="241" fill="#b8860b" font-size="9" font-weight="600">duct (CBD)</text>

  <!-- Stone obstruction callout -->
  <line x1="262" y1="162" x2="320" y2="195" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="322" y="195" fill="#c0392b" font-size="10" font-weight="600">Stone obstruction</text>
  <text x="322" y="207" fill="#c0392b" font-size="9">Bile trapped →</text>
  <text x="322" y="218" fill="#c0392b" font-size="9">inflammation</text>

  <!-- Stone in GB label -->
  <line x1="192" y1="250" x2="145" y2="255" stroke="#8a7e6e" stroke-width="0.8" opacity="0.6"/>
  <text x="108" y="255" fill="#8a7e6e" font-size="9">Gallstones</text>
  <circle cx="118" cy="260" r="3" fill="url(#stone-grad)" stroke="#6b4410" stroke-width="0.6"/>
  <circle cx="130" cy="262" r="2.5" fill="url(#stone-grad)" stroke="#6b4410" stroke-width="0.6" opacity="0.7"/>

  <!-- Ampulla label -->
  <line x1="290" y1="358" x2="310" y2="388" stroke="#a08060" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.6"/>
  <text x="310" y="388" fill="#a08060" font-size="8">Ampulla of Vater</text>
  <text x="310" y="398" fill="#a08060" font-size="8">(CBD &amp; pancreatic</text>
  <text x="310" y="408" fill="#a08060" font-size="8">duct join here)</text>

  <!-- ═══════════ MECHANISM INSETS ═══════════ -->

  <!-- Separator line -->
  <line x1="20" y1="440" x2="480" y2="440" stroke="#e0e0dc" stroke-width="1"/>

  <!-- Inset A: Billiary colic (temporary obstruction) -->
  <g transform="translate(20, 450)">
    <rect x="0" y="0" width="220" height="130" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="110" y="18" fill="#8a7e6e" font-size="10" font-weight="600" text-anchor="middle">Biliary Colic</text>
    <!-- Gallbladder cartoon -->
    <ellipse cx="60" cy="55" rx="18" ry="22" fill="url(#gb-grad)" stroke="#3a4a1a" stroke-width="1" opacity="0.7"/>
    <!-- Cystic duct -->
    <path d="M75,42 C85,38 95,38 100,42" fill="none" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Stone at cystic duct -->
    <circle cx="85" cy="42" r="5" fill="url(#stone-grad)" stroke="#c0392b" stroke-width="1" stroke-dasharray="2,1"/>
    <!-- Pain lines -->
    <path d="M38,45 C30,40 28,48 35,52" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    <path d="M40,60 C32,58 30,65 36,68" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    <text x="110" y="55" fill="#1a1a1a" font-size="8">Stone temporarily blocks</text>
    <text x="110" y="68" fill="#1a1a1a" font-size="8">cystic duct → pain after</text>
    <text x="110" y="81" fill="#1a1a1a" font-size="8">meals, resolves in hours</text>
    <!-- Arrow showing stone falls back -->
    <path d="M85,50 C85,60 80,68 75,72" fill="none" stroke="#8a7e6e" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.5"/>
    <text x="60" y="100" fill="#8a7e6e" font-size="7">Stone falls back → pain resolves</text>
  </g>

  <!-- Inset B: Cholecystitis (persistent obstruction) -->
  <g transform="translate(260, 450)">
    <rect x="0" y="0" width="220" height="130" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="110" y="18" fill="#8a7e6e" font-size="10" font-weight="600" text-anchor="middle">Acute Cholecystitis</text>
    <!-- Swollen, inflamed GB -->
    <ellipse cx="60" cy="55" rx="22" ry="26" fill="#b04040" stroke="#8b2020" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="60" cy="55" rx="18" ry="22" fill="url(#gb-grad)" stroke="#3a4a1a" stroke-width="1" opacity="0.5"/>
    <!-- Thicker wall -->
    <ellipse cx="60" cy="55" rx="22" ry="26" fill="none" stroke="#c0392b" stroke-width="2.5" opacity="0.7"/>
    <!-- Red X on stone stays stuck -->
    <circle cx="85" cy="42" r="5" fill="url(#stone-grad)" stroke="#c0392b" stroke-width="1.5"/>
    <line x1="80" y1="38" x2="90" y2="46" stroke="#c0392b" stroke-width="2" opacity="0.8"/>
    <line x1="90" y1="38" x2="80" y2="46" stroke="#c0392b" stroke-width="2" opacity="0.8"/>
    <!-- Inflamed markers -->
    <path d="M35,40 C28,35 25,45 32,48" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.7"/>
    <path d="M35,60 C28,58 25,65 32,68" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.7"/>
    <path d="M40,75 C35,80 32,88 38,90" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    <text x="110" y="50" fill="#1a1a1a" font-size="8">Stone stays stuck →</text>
    <text x="110" y="63" fill="#1a1a1a" font-size="8">GB wall thickens,</text>
    <text x="110" y="76" fill="#1a1a1a" font-size="8">swells, and becomes</text>
    <text x="110" y="89" fill="#1a1a1a" font-size="8">infected (fever + pain)</text>
    <!-- ER indicator -->
    <text x="110" y="110" fill="#c0392b" font-size="8" font-weight="600">⚠️ Surgical emergency</text>
  </g>

  <!-- Title -->
  <text x="250" y="24" fill="var(--text, #1a1a1a)" font-size="12" font-weight="700" text-anchor="middle">Gallbladder &amp; Bile Duct Anatomy — Stone Obstruction</text>
</svg>
