<svg class="anatomy-svg" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#eddcc8"/></linearGradient>
    <linearGradient id="airway-healthy" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#e6a817"/></linearGradient>
    <linearGradient id="airway-inflamed" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e88d5a"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <linearGradient id="mucosa-normal" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f0e6d0"/><stop offset="100%" stop-color="#e0d4be"/></linearGradient>
    <linearGradient id="mucosa-swollen" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#d4a0a0" stop-opacity="0.6"/><stop offset="100%" stop-color="#c08080" stop-opacity="0.7"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7e6e"/>
    </marker>
  </defs>

  <!-- ═══════════ TORSO OUTLINE (anterior view) ═══════════ -->

  <!-- Torso outline -->
  <path d="M150,40 C145,45 140,52 138,62 L132,90 C128,120 126,160 128,200 L130,240 C132,270 135,295 140,315 L145,340 C148,355 150,365 150,375 L152,400 L155,430 C158,455 162,475 168,490 L175,505 L185,515 L198,520 L210,522 L225,520 L238,518 L250,515 L255,513 L260,515 L270,518 L280,520 L295,522 L308,520 L320,515 L330,505 L338,490 L344,475 L348,455 L352,430 L355,400 L357,375 C360,365 362,355 365,340 L370,315 C375,295 378,270 380,240 L382,200 C384,160 382,120 378,90 L372,62 C370,52 365,45 360,40 C355,36 348,34 340,33 L328,30 C310,27 290,25 270,25 L240,25 C220,25 200,27 182,30 L170,33 C162,35 155,38 150,40 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.9"/>

  <!-- ═══════════ TRACHEA ═══════════ -->

  <!-- Trachea (windpipe) - main airway -->
  <path d="M240,55 L245,70 L248,90 L250,110 L252,130 L254,150 L255,170 L256,190 L256,210 L255,230 L254,245 L252,260 L250,275 L248,290 L245,305 L242,318 L238,330 L235,340"
        fill="none" stroke="url(#airway-healthy)" stroke-width="22" stroke-linecap="round" opacity="0.7"/>

  <!-- Trachea cartilage rings -->
  <path d="M225,70 L243,74 L261,70" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M225,95 L244,99 L263,95" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M228,120 L245,124 L262,120" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M230,145 L247,149 L264,145" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M232,170 L248,174 L264,170" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M233,195 L249,199 L265,195" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M233,220 L249,224 L265,220" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>
  <path d="M233,245 L248,249 L263,245" fill="none" stroke="#c4b5a0" stroke-width="1.5" opacity="0.4"/>

  <!-- Trachea label -->
  <text x="278" y="150" fill="#8a7e6e" font-size="11" font-weight="600">Trachea</text>
  <text x="278" y="163" fill="#8a7e6e" font-size="9">(windpipe)</text>
  <line x1="275" y1="155" x2="263" y2="155" stroke="#8a7e6e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ═══════════ CARINA &amp; MAIN BRONCHI ═══════════ -->

  <!-- Carina (bifurcation point) -->
  <circle cx="238" cy="340" r="6" fill="#e6a817" opacity="0.5"/>
  <text x="278" y="370" fill="#8a7e6e" font-size="9">Carina</text>
  <text x="278" y="382" fill="#8a7e6e" font-size="9">(bifurcation)</text>
  <line x1="278" y1="376" x2="244" y2="348" stroke="#8a7e6e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- RIGHT main bronchus (wider, more vertical) - HEALTHY SIDE -->
  <path d="M235,340 C260,355 285,370 310,390 C335,410 355,430 370,450 C378,462 384,472 388,480"
        fill="none" stroke="url(#airway-healthy)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>

  <!-- Right branch labels -->
  <text x="388" y="432" fill="#8a7e6e" font-size="11" font-weight="600">Right</text>
  <text x="388" y="445" fill="#8a7e6e" font-size="11" font-weight="600">bronchus</text>
  <line x1="388" y1="438" x2="358" y2="438" stroke="#8a7e6e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Right secondary bronchi (branching into right lung) -->
  <path d="M340,410 C355,405 370,398 382,392" fill="none" stroke="url(#airway-healthy)" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M362,430 C378,425 392,420 404,416" fill="none" stroke="url(#airway-healthy)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M378,450 C390,448 400,445 408,442" fill="none" stroke="url(#airway-healthy)" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <path d="M355,420 C368,420 380,420 390,422" fill="none" stroke="url(#airway-healthy)" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- Right lung outline (ghosted) -->
  <path d="M370,350 C385,355 398,365 408,380 C418,398 425,420 428,445 C430,465 428,485 422,500 L418,510 L412,518 L404,522 L395,524 L385,522 L375,518 L368,512 L362,504 L358,495 L355,485 L352,472 L350,458 L350,445 L352,432 L356,420 L362,408 L370,398 L378,388 L385,378 L388,368 L385,358 L378,352 L372,348 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.3"/>

  <text x="400" y="462" fill="#8a7e6e" font-size="10" font-style="italic">Right lung</text>

  <!-- LEFT main bronchus (narrower, more horizontal) - INFLAMED SIDE -->
  <path d="M235,340 C210,358 185,378 162,400 C142,418 128,436 118,452 C110,464 105,474 102,480"
        fill="none" stroke="url(#airway-inflamed)" stroke-width="18" stroke-linecap="round" opacity="0.75"/>

  <!-- Left branch labels -->
  <text x="52" y="432" fill="#8a7e6e" font-size="11" font-weight="600">Left</text>
  <text x="52" y="445" fill="#8a7e6e" font-size="11" font-weight="600">bronchus</text>
  <line x1="62" y1="438" x2="115" y2="438" stroke="#8a7e6e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Left secondary bronchi (branching into left lung) - shown as inflamed -->
  <path d="M160,415 C145,412 132,408 122,404" fill="none" stroke="url(#airway-inflamed)" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M140,435 C125,432 112,428 102,425" fill="none" stroke="url(#airway-inflamed)" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M125,455 C115,453 106,450 100,448" fill="none" stroke="url(#airway-inflamed)" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M148,440 C135,442 124,443 115,444" fill="none" stroke="url(#airway-inflamed)" stroke-width="8" stroke-linecap="round" opacity="0.55"/>

  <!-- Left lung outline (ghosted) -->
  <path d="M120,352 C108,358 98,368 90,382 C82,400 78,420 78,445 C78,465 80,485 86,500 L92,510 L98,518 L106,522 L115,524 L124,522 L132,518 L138,512 L142,504 L145,495 L148,485 L150,472 L152,458 L152,445 L150,432 L146,420 L140,408 L134,398 L126,388 L118,378 L112,368 L110,358 L112,350 L116,348 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.3"/>

  <text x="110" y="460" fill="#8a7e6e" font-size="10" font-style="italic">Left lung</text>

  <!-- ═══════════ INFLAMMATION MARKERS (left/red side) ═══════════ -->

  <!-- Inflammation indicators on left bronchus -->
  <path d="M145,372 C140,378 138,385 140,392" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M118,398 C112,404 110,412 112,420" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M98,428 C92,434 90,442 92,450" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Inflammation label -->
  <text x="38" y="370" fill="#c0392b" font-size="10" font-weight="600">Inflammation</text>
  <text x="38" y="383" fill="#c0392b" font-size="10">&amp; swelling</text>
  <text x="38" y="396" fill="#c0392b" font-size="9">(bronchitis)</text>
  <line x1="62" y1="383" x2="118" y2="383" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Mucus drip markers on left side -->
  <path d="M130,460 C128,465 126,470 125,475" fill="none" stroke="#e6a817" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.5"/>
  <path d="M135,455 C133,462 131,468 130,474" fill="none" stroke="#e6a817" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Excessive mucus label -->
  <text x="12" y="492" fill="#8a7e6e" font-size="9">Excess mucus</text>
  <text x="12" y="504" fill="#8a7e6e" font-size="9">production</text>
  <line x1="60" y1="498" x2="128" y2="468" stroke="#8a7e6e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ═══════════ HEALTHY LABEL (right side) ═══════════ -->

  <text x="375" y="360" fill="#6a9e6a" font-size="10" font-weight="600">Healthy</text>
  <text x="375" y="373" fill="#8a7e6e" font-size="9">airway</text>

  <!-- ═══════════ CROSS-SECTION INSETS ═══════════ -->

  <line x1="30" y1="535" x2="470" y2="535" stroke="#e0e0dc" stroke-width="1"/>

  <!-- Healthy bronchus cross-section (right) -->
  <g transform="translate(260, 545)">
    <rect x="0" y="0" width="200" height="50" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="100" y="16" fill="#6a9e6a" font-size="10" font-weight="600" text-anchor="middle">✓ Healthy Bronchus</text>
    <text x="100" y="32" fill="#8a7e6e" font-size="8" text-anchor="middle">Open airway, thin mucosa,</text>
    <text x="100" y="44" fill="#8a7e6e" font-size="8" text-anchor="middle">normal mucus, clear cilia</text>
  </g>

  <!-- Bronchitis cross-section (left) -->
  <g transform="translate(40, 545)">
    <rect x="0" y="0" width="200" height="50" rx="6" fill="var(--surface, #fff)" stroke="#c0392b" stroke-width="1" opacity="0.9"/>
    <text x="100" y="16" fill="#c0392b" font-size="10" font-weight="600" text-anchor="middle">✗ Acute Bronchitis</text>
    <text x="100" y="32" fill="#8a7e6e" font-size="8" text-anchor="middle">Swollen mucosa, narrowed airway,</text>
    <text x="100" y="44" fill="#8a7e6e" font-size="8" text-anchor="middle">excess mucus, damaged cilia</text>
  </g>

  <!-- Cross-section diagram: healthy (circular airway) -->
  <g transform="translate(95, 75)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
    <!-- Outer wall -->
    <circle cx="30" cy="30" r="26" fill="#f0e6d0" stroke="#d4c8b8" stroke-width="1" opacity="0.6"/>
    <!-- Airway lumen -->
    <circle cx="30" cy="30" r="16" fill="#f5c842" opacity="0.4"/>
    <circle cx="30" cy="30" r="12" fill="#f5c842" opacity="0.2"/>
    <!-- Cilia (tiny hairs) -->
    <path d="M46,30 L50,26 M46,28 L50,24 M46,32 L50,28 M46,34 L50,30" fill="none" stroke="#d4a030" stroke-width="0.8" opacity="0.5"/>
    <path d="M14,30 L10,26 M14,28 L10,24 M14,32 L10,28 M14,34 L10,30" fill="none" stroke="#d4a030" stroke-width="0.8" opacity="0.5"/>
    <path d="M30,4 L26,2 M28,4 L24,2 M32,4 L28,2 M34,4 L30,2" fill="none" stroke="#d4a030" stroke-width="0.8" opacity="0.5"/>
    <path d="M30,56 L26,58 M28,56 L24,58 M32,56 L28,58 M34,56 L30,58" fill="none" stroke="#d4a030" stroke-width="0.8" opacity="0.5"/>
    <text x="30" y="68" fill="#6a9e6a" font-size="7" text-anchor="middle">Healthy</text>
    <text x="30" y="77" fill="#6a9e6a" font-size="7" text-anchor="middle">cross-section</text>
  </g>

  <!-- Cross-section diagram: inflamed -->
  <g transform="translate(295, 75)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
    <!-- Outer wall (full thickness) -->
    <circle cx="30" cy="30" r="26" fill="#e0c0c0" stroke="#c08080" stroke-width="1.2" opacity="0.6"/>
    <!-- Swollen mucosa (thicker ring) -->
    <circle cx="30" cy="30" r="22" fill="url(#mucosa-swollen)" stroke="#c08080" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
    <!-- Narrowed airway lumen -->
    <circle cx="30" cy="30" r="8" fill="#e88d5a" opacity="0.4"/>
    <circle cx="30" cy="30" r="5" fill="#c0392b" opacity="0.3"/>
    <!-- Mucus inside -->
    <ellipse cx="28" cy="28" rx="4" ry="3" fill="#e6a817" opacity="0.4"/>
    <ellipse cx="32" cy="26" rx="3" ry="2" fill="#e6a817" opacity="0.3"/>
    <!-- Damaged cilia (shorter, fewer) -->
    <path d="M48,28 L51,26 M48,32 L51,30" fill="none" stroke="#c0392b" stroke-width="0.8" opacity="0.4"/>
    <path d="M12,28 L9,26 M12,32 L9,30" fill="none" stroke="#c0392b" stroke-width="0.8" opacity="0.4"/>
    <!-- Red inflammation markers -->
    <path d="M48,30 L52,30" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.5"/>
    <path d="M8,30 L4,30" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.5"/>
    <text x="30" y="68" fill="#c0392b" font-size="7" text-anchor="middle">Inflamed</text>
    <text x="30" y="77" fill="#c0392b" font-size="7" text-anchor="middle">cross-section</text>
  </g>

  <!-- Title -->
  <text x="250" y="24" fill="var(--text, #1a1a1a)" font-size="14" font-weight="700" text-anchor="middle">Bronchial Tree — Anterior View</text>
  <text x="250" y="40" fill="#8a7e6e" font-size="10" text-anchor="middle">Left: inflamed (bronchitis) · Right: healthy airway</text>
</svg>
