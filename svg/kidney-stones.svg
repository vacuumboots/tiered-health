<svg class="anatomy-svg" viewBox="0 0 500 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kidney-surface" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e8c4a0"/><stop offset="100%" stop-color="#d4a87a"/></linearGradient>
    <linearGradient id="cortex" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#dbb48f"/><stop offset="100%" stop-color="#c9a27e"/></linearGradient>
    <linearGradient id="medulla" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c2956a"/><stop offset="100%" stop-color="#af8458"/></linearGradient>
    <linearGradient id="pelvis" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f0dcc8"/><stop offset="100%" stop-color="#e0c8b0"/></linearGradient>
    <linearGradient id="ureter" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0c8b0"/><stop offset="100%" stop-color="#d0b8a0"/></linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="50%" stop-color="#d4c8b8"/><stop offset="100%" stop-color="#c0b0a0"/></linearGradient>
    <linearGradient id="stone-core" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c0392b"/><stop offset="100%" stop-color="#a93226"/></linearGradient>
    <linearGradient id="vessel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7e6e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="250" y="22" fill="var(--text, #1a1a1a)" font-size="13" font-weight="700" text-anchor="middle">Kidney &amp; Ureter — Stone Locations</text>

  <!-- ═══════ KIDNEY OUTER SHAPE ═══════ -->
  <g transform="translate(30, 20)">
    <!-- Kidney outline (bean shape) -->
    <path d="M140,35 C160,30 185,32 205,45 C225,58 240,78 248,100 C256,122 256,145 250,168 C244,191 232,212 215,228 C200,240 182,248 162,250 C142,252 120,248 102,238 C84,228 70,212 62,194 C54,176 52,155 54,134 C56,113 62,94 74,78 C86,62 102,50 120,42 C128,38 134,36 140,35 Z"
          fill="url(#kidney-surface)" stroke="#c4a88a" stroke-width="1.5" opacity="0.95" filter="url(#shadow)"/>

    <!-- Renal artery (entering hilum) -->
    <path d="M220,145 C235,143 250,140 265,138 C280,136 290,135 300,134"
          fill="none" stroke="url(#vessel)" stroke-width="4" stroke-linecap="round"/>
    <text x="302" y="130" fill="#c0392b" font-size="9" font-style="italic">Renal a.</text>

    <!-- Renal vein (exiting hilum) -->
    <path d="M218,178 C235,180 252,183 270,185 C285,187 295,188 305,189"
          fill="none" stroke="#3498db" stroke-width="4.5" stroke-linecap="round"/>
    <text x="305" y="188" fill="#2980b9" font-size="9" font-style="italic">Renal v.</text>

    <!-- Hilum notch (indentation) -->
    <path d="M200,145 C210,152 215,160 215,170 C215,178 210,185 205,190 C200,195 195,198 190,200"
          fill="none" stroke="#b09070" stroke-width="1.5"/>

    <!-- ═══════ INTERNAL KIDNEY ANATOMY ═══════ -->

    <!-- Medulla (pyramids) - triangular regions -->
    <!-- Pyramid 1 (upper) -->
    <path d="M110,65 C120,60 135,62 145,70 C152,76 155,85 150,95 C142,105 128,108 118,100 C108,92 105,80 110,65 Z"
          fill="url(#medulla)" stroke="#af8458" stroke-width="1" opacity="0.7"/>
    <!-- Pyramid 2 (mid-upper) -->
    <path d="M100,105 C112,100 128,102 138,112 C145,120 145,132 138,140 C128,148 112,148 102,140 C94,132 92,118 100,105 Z"
          fill="url(#medulla)" stroke="#af8458" stroke-width="1" opacity="0.7"/>
    <!-- Pyramid 3 (mid) -->
    <path d="M92,148 C104,142 120,144 130,154 C137,162 137,174 130,182 C120,190 104,190 94,182 C86,174 84,160 92,148 Z"
          fill="url(#medulla)" stroke="#af8458" stroke-width="1" opacity="0.7"/>
    <!-- Pyramid 4 (mid-lower) -->
    <path d="M98,190 C108,185 122,187 130,196 C136,204 135,215 128,222 C120,228 108,228 100,222 C94,216 92,204 98,190 Z"
          fill="url(#medulla)" stroke="#af8458" stroke-width="1" opacity="0.7"/>
    <!-- Pyramid 5 (lower) -->
    <path d="M112,228 C122,224 135,226 142,233 C148,240 147,250 140,256 C132,262 118,260 110,254 C104,248 104,236 112,228 Z"
          fill="url(#medulla)" stroke="#af8458" stroke-width="1" opacity="0.7"/>

    <!-- Cortex (outer rim) -->
    <path d="M140,35 C160,30 185,32 205,45 C225,58 240,78 248,100 C256,122 256,145 250,168 C244,191 232,212 215,228 C200,240 182,248 162,250 C142,252 120,248 102,238 C84,228 70,212 62,194 C54,176 52,155 54,134 C56,113 62,94 74,78 C86,62 102,50 120,42 C128,38 134,36 140,35 Z"
          fill="none" stroke="#c9a27e" stroke-width="8" opacity="0.3"/>

    <!-- Renal pelvis (funnel-shaped collecting area) -->
    <path d="M130,154 C140,148 155,145 170,145 C180,145 190,148 198,155 C205,162 208,172 205,182 C200,192 192,198 182,200 C172,202 160,200 150,195 C140,190 133,182 130,172 C127,164 127,158 130,154 Z"
          fill="url(#pelvis)" stroke="#d0b8a0" stroke-width="1.2"/>

    <!-- Calyces (minor) - connecting pyramids to pelvis -->
    <!-- Upper calyx -->
    <path d="M130,100 C138,98 148,100 155,108 C160,115 162,125 158,135 C152,142 142,148 135,148 C128,148 124,140 126,130 C128,120 130,110 130,100 Z"
          fill="url(#pelvis)" stroke="#d0b8a0" stroke-width="1" opacity="0.8"/>
    <!-- Lower calyx -->
    <path d="M115,210 C122,206 132,206 140,210 C148,215 152,224 150,232 C148,238 140,242 132,240 C124,238 116,230 114,222 C113,216 113,212 115,210 Z"
          fill="url(#pelvis)" stroke="#d0b8a0" stroke-width="1" opacity="0.8"/>

    <!-- ═══════ STONE IN KIDNEY (calyx) ═══════ -->
    <g transform="translate(138, 114)">
      <circle cx="0" cy="0" r="7" fill="url(#stone)" stroke="#a09080" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="-1" cy="-1" r="2" fill="url(#stone-core)" opacity="0.6"/>
    </g>

    <!-- Stone label --> 
    <line x1="150" y1="114" x2="178" y2="85" stroke="#8a7e6e" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="180" y="80" fill="#8a7e6e" font-size="9" font-weight="600">Calculus (stone)</text>
    <text x="180" y="92" fill="#8a7e6e" font-size="8">in the renal calyx</text>

    <!-- Cortex label -->
    <line x1="65" y1="68" x2="45" y2="60" stroke="#8a7e6e" stroke-width="0.8"/>
    <text x="14" y="58" fill="#8a7e6e" font-size="9" font-style="italic">Cortex</text>

    <!-- Medulla label -->
    <line x1="72" y1="140" x2="45" y2="135" stroke="#8a7e6e" stroke-width="0.8"/>
    <text x="14" y="139" fill="#8a7e6e" font-size="9" font-style="italic">Medulla</text>

    <!-- Pyramid label -->
    <line x1="78" y1="115" x2="45" y2="108" stroke="#8a7e6e" stroke-width="0.8"/>
    <text x="14" y="106" fill="#8a7e6e" font-size="8">Renal pyramid</text>

    <!-- Pelvis label -->
    <text x="155" y="196" fill="#8a7e6e" font-size="9" font-style="italic">Renal pelvis</text>

    <!-- ═══════ URETER ═══════ -->
    <path d="M182,200 C190,210 195,225 195,240 C195,255 192,270 188,285 C184,300 180,315 178,330 C176,345 176,360 178,375 C180,390 184,405 186,420"
          fill="none" stroke="url(#ureter)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M182,200 C190,210 195,225 195,240 C195,255 192,270 188,285 C184,300 180,315 178,330 C176,345 176,360 178,375 C180,390 184,405 186,420"
          fill="none" stroke="#d0b8a0" stroke-width="1.2" opacity="0.5"/>

    <!-- Ureter label -->
    <line x1="178" y1="340" x2="160" y2="340" stroke="#8a7e6e" stroke-width="0.8"/>
    <text x="130" y="337" fill="#8a7e6e" font-size="9" font-style="italic">Ureter</text>
    <text x="130" y="349" fill="#8a7e6e" font-size="8">(~3–4 mm diameter)</text>

    <!-- ═══════ STONE IN URETER (proximal) ═══════ -->
    <g transform="translate(190, 252)">
      <circle cx="0" cy="0" r="6" fill="url(#stone)" stroke="#a09080" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="-1" cy="-1" r="1.5" fill="url(#stone-core)" opacity="0.5"/>
    </g>

    <!-- ═══════ STONE IN URETER (mid) - stuck ═══════ -->
    <g transform="translate(183, 320)">
      <circle cx="0" cy="0" r="7" fill="url(#stone)" stroke="#a09080" stroke-width="1" filter="url(#shadow)"/>
      <circle cx="-1" cy="-1" r="2" fill="url(#stone-core)" opacity="0.5"/>
      <!-- Pain indicator -->
      <path d="M-12,-12 L-8,-8 M-14,-6 L-9,-5 M-13,2 L-8,1 M-12,10 L-7,9"
            fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Mid-ureter stone label -->
    <line x1="175" y1="322" x2="148" y2="302" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="92" y="297" fill="#c0392b" font-size="9" font-weight="600">Obstructing stone</text>
    <text x="98" y="309" fill="#c0392b" font-size="8">(causes hydronephrosis)</text>

    <!-- ═══════ STONE IN DISTAL URETER ═══════ -->
    <g transform="translate(185, 395)">
      <circle cx="0" cy="0" r="5" fill="url(#stone)" stroke="#a09080" stroke-width="1" filter="url(#shadow)"/>
    </g>
    <line x1="192" y1="395" x2="225" y2="395" stroke="#8a7e6e" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="227" y="392" fill="#8a7e6e" font-size="8">Distal stone</text>
    <text x="227" y="403" fill="#8a7e6e" font-size="8">(near UVJ)</text>

    <!-- ═══════ BLADDER HINT ═══════════ -->
    <path d="M170,422 C175,418 185,416 195,418 C205,420 212,425 215,432 C218,440 215,448 208,454 C200,458 188,460 178,456 C168,452 162,445 162,438 C162,430 165,425 170,422 Z"
          fill="none" stroke="#b0a090" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <text x="160" y="468" fill="#b0a090" font-size="8" font-style="italic">Bladder</text>

    <!-- ═══════ STONE FORMATION INSET ═══════ -->
    <line x1="20" y1="470" x2="460" y2="470" stroke="#e0e0dc" stroke-width="1"/>

    <g transform="translate(20, 476)">
      <rect x="0" y="0" width="140" height="62" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
      <text x="70" y="16" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Stone Formation</text>
      <!-- Supersaturation of Ca²⁺ + Ox -->
      <text x="14" y="32" fill="#6a5d4e" font-size="7">Supersaturated urine</text>
      <text x="14" y="42" fill="#6a5d4e" font-size="7">(Ca²⁺ + oxalate)</text>
      <!-- Arrow -->
      <text x="32" y="53" fill="#8a7e6e" font-size="9">→</text>
      <!-- Crystal aggregation -->
      <text x="48" y="32" fill="#6a5d4e" font-size="7">Crystal nucleation</text>
      <text x="48" y="42" fill="#6a5d4e" font-size="7">&amp; aggregation</text>
      <!-- Arrow -->
      <text x="77" y="53" fill="#8a7e6e" font-size="9">→</text>
      <!-- Stone growth -->
      <text x="92" y="32" fill="#6a5d4e" font-size="7">Stone growth</text>
      <text x="92" y="42" fill="#6a5d4e" font-size="7">on Randall's</text>
      <text x="92" y="52" fill="#6a5d4e" font-size="7">plaque</text>
    </g>

    <!-- Stone composition inset -->
    <g transform="translate(180, 476)">
      <rect x="0" y="0" width="140" height="62" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
      <text x="70" y="16" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Stone Composition</text>
      <!-- Bar: Calcium oxalate ~80% -->
      <rect x="14" y="22" width="90" height="8" rx="2" fill="#e8c4a0" stroke="#c4a88a" stroke-width="0.5"/>
      <text x="107" y="29" fill="#8a7e6e" font-size="7">~80%</text>
      <text x="14" y="28" fill="#8a7e6e" font-size="6" font-weight="600">Ca oxalate</text>
      <!-- Bar: Calcium phosphate ~10% -->
      <rect x="14" y="34" width="35" height="8" rx="2" fill="#d0bcd0" stroke="#c0a8c0" stroke-width="0.5"/>
      <text x="52" y="41" fill="#8a7e6e" font-size="7">~10%</text>
      <text x="14" y="40" fill="#8a7e6e" font-size="6" font-weight="600">Ca phosphate</text>
      <!-- Bar: Uric acid ~8% -->
      <rect x="14" y="46" width="28" height="8" rx="2" fill="#d8c8a0" stroke="#c8b890" stroke-width="0.5"/>
      <text x="45" y="53" fill="#8a7e6e" font-size="7">~8%</text>
      <text x="14" y="52" fill="#8a7e6e" font-size="6" font-weight="600">Uric acid</text>
    </g>

    <!-- Pain referral pattern inset -->
    <g transform="translate(340, 476)">
      <rect x="0" y="0" width="140" height="62" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
      <text x="70" y="16" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Pain Location by Stone Site</text>
      <text x="14" y="32" fill="#6a5d4e" font-size="7">Upper ureter: flank pain</text>
      <text x="14" y="42" fill="#6a5d4e" font-size="7">Mid ureter: lower abdominal</text>
      <text x="14" y="52" fill="#6a5d4e" font-size="7">Distal ureter: groin/testicle</text>
    </g>

  </g>
</svg>
