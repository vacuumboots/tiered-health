<svg class="anatomy-svg" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#eddcc8"/></linearGradient>
    <linearGradient id="bone-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e8ddd0"/><stop offset="100%" stop-color="#d4c8b8"/></linearGradient>
    <linearGradient id="pancreas" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#e6a817"/></linearGradient>
    <linearGradient id="pancreas-inflamed" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e74c3c"/><stop offset="50%" stop-color="#f39c12"/><stop offset="100%" stop-color="#e6a817"/></linearGradient>
    <linearGradient id="duct" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c0392b"/><stop offset="100%" stop-color="#a93226"/></linearGradient>
    <linearGradient id="liver" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8e44ad"/><stop offset="100%" stop-color="#7d3c98"/></linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#27ae60"/><stop offset="100%" stop-color="#229954"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7e6e"/>
    </marker>
  </defs>

  <!-- Torso outline (upper abdomen, anterior view) -->
  <path d="M100,20 C90,25 85,35 82,50 L78,90 L75,130 L72,170 L70,200 L72,230 L78,260 L85,285 L95,305 L108,318 L125,328 L145,335 L160,338 L180,340 L200,340 L220,340 L240,340 L255,338 L270,335 L290,328 L305,318 L318,305 L328,285 L335,260 L340,230 L342,200 L340,170 L338,130 L335,90 L332,50 L330,35 L325,25 L315,20 L300,18 L280,16 L250,15 L220,14 L190,15 L160,16 L130,18 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="1.2" opacity="0.85"/>

  <!-- Rib cage outline (ghosted) -->
  <path d="M100,60 C105,65 110,70 115,80 L120,90 L125,100" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.4"/>
  <path d="M90,80 C98,85 108,90 118,100 L125,110" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.35"/>
  <path d="M85,100 C95,105 108,112 120,125 L128,135" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.3"/>
  <path d="M82,120 C92,125 108,132 122,145 L132,155" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.25"/>
  <path d="M340,60 C335,65 330,70 325,80 L320,90 L315,100" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.4"/>
  <path d="M350,80 C342,85 332,90 322,100 L315,110" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.35"/>
  <path d="M355,100 C345,105 332,112 320,125 L312,135" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.3"/>
  <path d="M358,120 C348,125 332,132 318,145 L308,155" fill="none" stroke="#d4c8b8" stroke-width="3" opacity="0.25"/>

  <!-- Liver (right upper quadrant) -->
  <path d="M175,55 C185,48 200,42 220,40 L240,40 L260,42 L275,48 L285,55 L290,65 L292,78 L290,90 L285,100 L275,108 L260,112 L245,115 L220,116 L195,115 L178,108 L170,100 L165,90 L163,78 L165,65 Z"
        fill="url(#liver)" stroke="#6c3483" stroke-width="1" opacity="0.35"/>
  <text x="228" y="82" fill="#6c3483" font-size="10" font-style="italic" opacity="0.7">Liver</text>

  <!-- Gallbladder -->
  <ellipse cx="248" cy="110" rx="12" ry="18" fill="url(#gb)" stroke="#1e8449" stroke-width="1" opacity="0.6" transform="rotate(-15,248,110)"/>
  <text x="235" y="138" fill="#1e8449" font-size="9" font-style="italic" opacity="0.7">Gallbladder</text>

  <!-- Stomach (ghosted) -->
  <path d="M200,140 C210,135 225,132 240,135 L260,140 L275,150 L285,165 L290,182 L288,200 L280,215 L268,225 L250,228 L235,225 L220,218 L208,205 L200,185 L195,165 L198,148 Z"
        fill="none" stroke="#b0a595" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="238" y="190" fill="#b0a595" font-size="10" font-style="italic" opacity="0.5">Stomach</text>

  <!-- PANCREAS (retroperitoneal, behind stomach) - inflamed -->
  <g filter="url(#soft)">
    <!-- Head of pancreas -->
    <ellipse cx="190" cy="208" rx="30" ry="20" fill="url(#pancreas-inflamed)" stroke="#c0392b" stroke-width="1.5" opacity="0.85" transform="rotate(-10,190,208)"/>
    <!-- Body of pancreas -->
    <path d="M200,200 C220,190 240,188 260,190 L280,195 L295,200" fill="none" stroke="url(#pancreas-inflamed)" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
    <!-- Tail of pancreas -->
    <ellipse cx="308" cy="200" rx="20" ry="15" fill="url(#pancreas-inflamed)" stroke="#c0392b" stroke-width="1.5" opacity="0.85" transform="rotate(10,308,200)"/>
  </g>

  <!-- Inflammation glow around pancreas -->
  <path d="M170,195 C170,175 310,175 320,195 C330,210 330,220 320,230 C310,240 170,240 170,220 Z"
        fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" filter="url(#glow)"/>
  <text x="240" y="232" fill="#c0392b" font-size="9" text-anchor="middle" font-weight="600">▸ Inflammation zone</text>

  <!-- Main pancreatic duct (of Wirsung) -->
  <path d="M180,210 C200,198 230,195 260,198 L290,200 L310,200"
        fill="none" stroke="url(#duct)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Common bile duct (joining the pancreatic duct) -->
  <path d="M248,130 C250,150 248,170 245,185 L242,198 C240,205 238,210 235,213"
        fill="none" stroke="#7d3c98" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <text x="252" y="165" fill="#7d3c98" font-size="8" font-style="italic" opacity="0.6">CBD</text>

  <!-- Ampulla of Vater (where ducts join) -->
  <circle cx="188" cy="214" r="5" fill="none" stroke="#e74c3c" stroke-width="1.5" opacity="0.8"/>
  <line x1="188" y1="219" x2="188" y2="235" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="188" y="244" fill="#c0392b" font-size="8" text-anchor="middle">Ampulla of Vater</text>

  <!-- Gallstone in cystic duct / common bile duct -->
  <circle cx="248" cy="157" r="4" fill="#a0522d" stroke="#8b4513" stroke-width="0.8" opacity="0.8"/>
  <text x="260" y="155" fill="#8b4513" font-size="8">Gallstone (40%)</text>

  <!-- Labels for pancreas parts -->
  <line x1="160" y1="208" x2="130" y2="180" stroke="#b8860b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="130" y1="180" x2="120" y2="180" stroke="#b8860b" stroke-width="1"/>
  <text x="108" y="177" fill="#b8860b" font-size="10" font-weight="600">Head</text>

  <line x1="260" y1="192" x2="260" y2="165" stroke="#b8860b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="242" y="163" fill="#b8860b" font-size="10" font-weight="600">Body</text>

  <line x1="325" y1="200" x2="340" y2="175" stroke="#b8860b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="340" y1="175" x2="350" y2="175" stroke="#b8860b" stroke-width="1"/>
  <text x="353" y="172" fill="#b8860b" font-size="10" font-weight="600">Tail</text>

  <!-- Duodenum outline (C-loop around head) -->
  <path d="M175,190 C168,195 163,200 160,210 C155,225 155,240 160,252 C168,265 178,272 190,272 C202,272 210,268 215,260 L218,250"
        fill="none" stroke="#b0a595" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <text x="168" y="272" fill="#b0a595" font-size="9" font-style="italic" opacity="0.6">Duodenum</text>

  <!-- Spleen (left upper quadrant, near tail) -->
  <ellipse cx="340" cy="155" rx="18" ry="22" fill="url(#liver)" stroke="#6c3483" stroke-width="1" opacity="0.25" transform="rotate(20,340,155)"/>
  <text x="335" y="142" fill="#6c3483" font-size="9" font-style="italic" opacity="0.5">Spleen</text>

  <!-- ═══════════ MECHANISM INSETS ═══════════ -->
  <line x1="20" y1="490" x2="480" y2="490" stroke="#e0e0dc" stroke-width="1"/>

  <!-- Key: Normal acinar cell -->
  <g transform="translate(20, 500)">
    <rect x="0" y="0" width="145" height="85" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.95"/>
    <text x="72" y="16" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Normal Acinar Cell</text>
    <!-- Cell body -->
    <ellipse cx="72" cy="48" rx="25" ry="18" fill="none" stroke="#7d3c98" stroke-width="1.5" opacity="0.6"/>
    <text x="72" y="44" fill="#7d3c98" font-size="7" text-anchor="middle">Zymogen</text>
    <text x="72" y="54" fill="#7d3c98" font-size="7" text-anchor="middle">granules</text>
    <!-- Duct -->
    <path d="M100,48 L120,48" fill="none" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
    <text x="120" y="44" fill="#27ae60" font-size="7">Duct</text>
    <text x="120" y="54" fill="#27ae60" font-size="7">patent</text>
  </g>

  <!-- Key: Premature trypsin activation -->
  <g transform="translate(177, 500)">
    <rect x="0" y="0" width="145" height="85" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.95"/>
    <text x="72" y="16" fill="#c0392b" font-size="9" font-weight="600" text-anchor="middle">Early Pancreatitis</text>
    <ellipse cx="72" cy="48" rx="25" ry="18" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    <!-- Explosion marks inside cell -->
    <path d="M55,40 L48,35 M60,35 L55,28 M82,35 L88,30 M85,45 L92,48" stroke="#c0392b" stroke-width="1" opacity="0.7"/>
    <text x="72" y="44" fill="#c0392b" font-size="7" text-anchor="middle">Premature</text>
    <text x="72" y="54" fill="#c0392b" font-size="7" text-anchor="middle">trypsin act.</text>
    <!-- Duct blockage -->
    <path d="M100,48 L110,48" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
    <line x1="112" y1="44" x2="118" y2="52" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
    <line x1="112" y1="52" x2="118" y2="44" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
    <text x="120" y="44" fill="#c0392b" font-size="7">Duct</text>
    <text x="120" y="54" fill="#c0392b" font-size="7">blocked</text>
    <!-- Left-to-right arrow from normal to early -->
    <path d="M145,48 L160,48" fill="none" stroke="#8a7e6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Key: Severe necrosis -->
  <g transform="translate(335, 500)">
    <rect x="0" y="0" width="145" height="85" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.95"/>
    <text x="72" y="16" fill="#c0392b" font-size="9" font-weight="600" text-anchor="middle">Severe Pancreatitis</text>
    <ellipse cx="72" cy="48" rx="25" ry="18" fill="none" stroke="#8b0000" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
    <!-- Necrotic debris -->
    <path d="M55,42 L60,38 L58,46 Z" fill="#8b0000" opacity="0.4"/>
    <path d="M75,40 L80,36 L82,44 Z" fill="#8b0000" opacity="0.3"/>
    <path d="M65,50 L70,48 L68,55 Z" fill="#8b0000" opacity="0.35"/>
    <!-- Inflammatory markers -->
    <text x="72" y="44" fill="#8b0000" font-size="7" text-anchor="middle">Acinar</text>
    <text x="72" y="54" fill="#8b0000" font-size="7" text-anchor="middle">necrosis</text>
    <!-- Systemic markers -->
    <text x="72" y="70" fill="#c0392b" font-size="7" text-anchor="middle">→ SIRS / organ failure</text>
    <!-- Arrow -->
    <path d="M145,48 L160,48" fill="none" stroke="#8a7e6e" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Title -->
  <text x="250" y="12" fill="var(--text, #1a1a1a)" font-size="12" font-weight="700" text-anchor="middle">Pancreatic Anatomy &amp; Acute Pancreatitis Mechanism</text>
</svg>
