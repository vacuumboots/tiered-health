<svg class="anatomy-svg" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#eddcc8"/></linearGradient>
    <linearGradient id="bone-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e8ddd0"/><stop offset="100%" stop-color="#d4c8b8"/></linearGradient>
    <linearGradient id="ligament" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#e6a817"/></linearGradient>
    <linearGradient id="ligament-tear" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5c842"/><stop offset="50%" stop-color="#f5c842"/><stop offset="50%" stop-color="#c0392b"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7e6e"/>
    </marker>
  </defs>

  <!-- Ankle outline (lateral view) -->
  <path d="M150,80 C140,85 135,95 132,110 L128,180 C125,210 125,240 128,270 L132,320 C135,345 140,360 148,370 L160,385 C170,395 180,400 190,398 L210,395 C225,392 235,385 240,375 L248,360 C252,350 255,340 258,330 L262,310 C265,290 265,270 262,250 L258,230 C255,215 250,200 245,188 L240,175 C235,160 230,148 225,140 L218,128 C210,120 200,115 190,112 L175,108 C163,105 155,100 150,80 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.9"/>

  <!-- Foot outline -->
  <path d="M190,398 C200,405 210,415 218,428 C225,440 230,455 232,470 C233,478 232,485 228,490 C224,495 218,498 210,498 C200,498 190,495 182,490 C175,485 170,478 168,468 C166,458 167,448 172,440 C178,430 185,420 190,398 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.85"/>

  <!-- Fibula bone -->
  <path d="M175,95 L173,120 L171,150 L170,180 L170,210 L172,240 L175,260 L180,275 L186,285 L192,290 L198,292 L202,290 L206,285 L210,278 L215,268 L220,255 L224,240 L226,220 L227,200 L226,180 L224,160 L222,140 L220,120 L218,105 L216,95 L212,88 L208,84 L204,82 L198,82 L192,84 L188,88 L184,92 L180,94 Z"
        fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="1" opacity="0.7"/>
  <text x="155" y="195" fill="#b0a595" font-size="11" font-style="italic">Fibula</text>

  <!-- Talus bone -->
  <path d="M182,310 C180,315 180,322 182,328 C185,335 190,340 196,343 L210,347 C220,348 230,347 238,344 C245,340 250,335 252,328 C254,320 253,314 250,310 L245,305 C238,298 228,294 218,292 L208,290 L198,292 C190,295 184,300 182,310 Z"
        fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="1" opacity="0.7"/>
  <text x="255" y="320" fill="#b0a595" font-size="11" font-style="italic">Talus</text>

  <!-- Calcaneus (heel bone) hint -->
  <path d="M172,440 C168,435 165,428 166,420 C168,412 173,408 180,405 L192,400 L198,398 L204,400 L210,404 L215,410 L218,418 L218,425 L215,432 L210,438 L204,442 L198,444 L190,445 L182,443 Z"
        fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="1" opacity="0.5"/>
  <text x="145" y="425" fill="#b0a595" font-size="10" font-style="italic">Calcaneus</text>

  <!-- ATFL: Anterior Talofibular Ligament (from fibula to talus, front) -->
  <path d="M200,290 C208,298 215,305 220,310 C225,315 228,318 230,320 C232,322 234,324 236,326"
        fill="none" stroke="url(#ligament)" stroke-width="4" stroke-linecap="round" filter="url(#soft)"/>
  <text x="230" y="295" fill="#b8860b" font-size="9" font-weight="600">ATFL</text>
  <text x="230" y="306" fill="#b8860b" font-size="8">(anterior</text>
  <text x="230" y="316" fill="#b8860b" font-size="8">talofibular)</text>

  <!-- CFL: Calcaneofibular Ligament (from fibula to calcaneus) -->
  <path d="M195,295 C192,308 190,320 190,335 C190,350 192,365 195,378 C198,390 200,398 203,405 C206,410 208,415 210,418"
        fill="none" stroke="url(#ligament)" stroke-width="3.5" stroke-linecap="round" filter="url(#soft)"/>
  <text x="158" y="350" fill="#b8860b" font-size="9" font-weight="600">CFL</text>
  <text x="148" y="362" fill="#b8860b" font-size="8">(calcaneo-</text>
  <text x="148" y="372" fill="#b8860b" font-size="8">fibular)</text>

  <!-- PTFL: Posterior Talofibular Ligament (behind the joint) -->
  <path d="M185,305 C180,315 176,325 174,335 C172,340 170,345 170,348"
        fill="none" stroke="url(#ligament)" stroke-width="3" stroke-linecap="round" filter="url(#soft)" stroke-dasharray="5,3"/>
  <text x="145" y="302" fill="#b8860b" font-size="9" font-weight="600">PTFL</text>
  <text x="136" y="314" fill="#b8860b" font-size="8">(posterior</text>
  <text x="136" y="324" fill="#b8860b" font-size="8">talofibular)</text>

  <!-- Inversion arrow showing mechanism of injury -->
  <path d="M260,440 C270,435 278,428 284,420 C290,412 294,402 295,392"
        fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="268" y="438" fill="#c0392b" font-size="9">Inversion</text>
  <text x="268" y="450" fill="#c0392b" font-size="9">force</text>

  <!-- Label: Lateral ankle ligaments -->
  <text x="270" y="272" fill="#8a7e6e" font-size="9" font-weight="600">Lateral ankle</text>
  <text x="270" y="284" fill="#8a7e6e" font-size="9" font-weight="600">ligaments</text>

  <!-- ═══════════ GRADE INSETS ═══════════ -->

  <!-- Separator line -->
  <line x1="30" y1="495" x2="470" y2="495" stroke="#e0e0dc" stroke-width="1"/>

  <!-- Grade I: Stretched ligament -->
  <g transform="translate(25, 505)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="70" y="18" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Grade I: Stretch</text>
    <!-- Two bone representations -->
    <ellipse cx="35" cy="48" rx="12" ry="8" fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="0.8"/>
    <ellipse cx="105" cy="48" rx="12" ry="8" fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="0.8"/>
    <!-- Ligament: intact, wavy (stretched but not torn) -->
    <path d="M45,50 C58,40 70,40 83,48 C90,52 98,50 105,48" fill="none" stroke="url(#ligament)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="70" y="70" fill="#8a7e6e" font-size="7" text-anchor="middle">Stretched, intact</text>
  </g>

  <!-- Grade II: Partially torn ligament -->
  <g transform="translate(180, 505)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="70" y="18" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Grade II: Partial Tear</text>
    <ellipse cx="35" cy="48" rx="12" ry="8" fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="0.8"/>
    <ellipse cx="105" cy="48" rx="12" ry="8" fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="0.8"/>
    <!-- Ligament: partially torn with a gap -->
    <path d="M45,50 C52,42 58,44 65,46 L65,46" fill="none" stroke="url(#ligament)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M75,44 C82,42 90,44 95,46 L105,48" fill="none" stroke="url(#ligament)" stroke-width="2" stroke-linecap="round"/>
    <!-- Tear gap with red dash -->
    <line x1="65" y1="42" x2="75" y2="48" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.8"/>
    <text x="70" y="70" fill="#8a7e6e" font-size="7" text-anchor="middle">Partially torn fibers</text>
  </g>

  <!-- Grade III: Complete tear -->
  <g transform="translate(335, 505)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="70" y="18" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Grade III: Complete Tear</text>
    <ellipse cx="35" cy="48" rx="12" ry="8" fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="0.8"/>
    <ellipse cx="105" cy="48" rx="12" ry="8" fill="url(#bone-grad)" stroke="#c4b5a0" stroke-width="0.8"/>
    <!-- Two torn ends separated by a gap -->
    <path d="M45,48 C48,46 50,48 52,48" fill="none" stroke="#e6a817" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M88,48 C92,48 95,46 98,46 L105,48" fill="none" stroke="#e6a817" stroke-width="2" stroke-linecap="round"/>
    <!-- Torn ends with ragged edge look -->
    <path d="M55,44 L58,48 L55,52" fill="none" stroke="#e6a817" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M85,44 L82,48 L85,52" fill="none" stroke="#e6a817" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Red gap markers -->
    <line x1="58" y1="42" x2="82" y2="42" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <line x1="58" y1="54" x2="82" y2="54" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="70" y="70" fill="#8a7e6e" font-size="7" text-anchor="middle">Complete rupture</text>
  </g>

  <!-- Title -->
  <text x="250" y="24" fill="var(--text, #1a1a1a)" font-size="12" font-weight="700" text-anchor="middle">Lateral Ankle Anatomy &amp; Sprain Grades</text>
</svg>
