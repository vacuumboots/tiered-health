<svg class="anatomy-svg" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#eddcc8"/></linearGradient>
    <linearGradient id="colon" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e8ddd0"/><stop offset="100%" stop-color="#d4c8b8"/></linearGradient>
    <linearGradient id="colon-motile" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#e6a817"/></linearGradient>
    <linearGradient id="nerve" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c0392b"/><stop offset="100%" stop-color="#e74c3c"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8a7e6e"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Torso outline (simplified, abdominal region) -->
  <path d="M100,40 C90,50 82,70 80,90 L75,170 C73,200 75,230 80,260 L85,300 C88,330 92,350 98,365 L105,380 C112,392 120,400 130,405 L145,410 C155,412 165,410 175,405 L190,398 C200,392 208,385 215,375 L225,360 C232,345 238,328 242,310 L248,280 C252,260 255,240 256,220 L258,195 C259,170 258,150 255,135 L250,110 C245,90 240,75 233,62 L225,50 C218,42 210,38 200,36 L185,34 L170,35 C155,36 140,38 125,40 Z"
        fill="url(#skin)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.35"/>

  <!-- Ascending colon (right side) -->
  <path d="M175,280 C178,310 180,340 178,360 C176,375 172,385 168,390"
        fill="none" stroke="url(#colon)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <text x="185" y="340" fill="#b0a595" font-size="9" font-style="italic">Ascending</text>
  <text x="185" y="352" fill="#b0a595" font-size="9" font-style="italic">colon</text>

  <!-- Cecum (bottom right) -->
  <ellipse cx="165" cy="400" rx="16" ry="12" fill="url(#colon)" stroke="#c4b5a0" stroke-width="1" opacity="0.7"/>
  <text x="116" y="408" fill="#b0a595" font-size="9" font-style="italic">Cecum</text>

  <!-- Appendix -->
  <path d="M152,408 C145,418 140,430 138,440 C137,445 138,448 140,448"
        fill="none" stroke="#b0a595" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <text x="110" y="448" fill="#b0a595" font-size="8" font-style="italic">Appendix</text>

  <!-- Transverse colon (top, with motility arrows) -->
  <path d="M168,260 C185,248 210,240 238,235 C260,232 278,232 295,235 C315,240 335,248 348,260"
        fill="none" stroke="url(#colon)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>

  <!-- Motility wave arrows on transverse colon -->
  <path d="M195,245 L205,235" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>
  <path d="M215,240 L225,230" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>
  <path d="M235,237 L245,227" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>
  <path d="M255,235 L265,225" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>
  <path d="M275,235 L285,225" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>
  <path d="M295,238 L305,228" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>
  <path d="M315,243 L325,233" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.4"/>

  <text x="250" y="218" fill="#b0a595" font-size="9" font-style="italic" text-anchor="middle">Transverse colon</text>

  <!-- Descending colon (left side) -->
  <path d="M348,260 C350,290 348,320 342,345 C338,358 332,368 325,375"
        fill="none" stroke="url(#colon)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <text x="355" y="315" fill="#b0a595" font-size="9" font-style="italic">Descending</text>
  <text x="355" y="327" fill="#b0a595" font-size="9" font-style="italic">colon</text>

  <!-- Sigmoid colon -->
  <path d="M320,380 C310,390 298,398 290,405 C278,415 270,422 268,430 C265,440 267,448 275,452 C282,455 290,452 298,448 C305,444 312,438 320,432 C328,425 335,420 342,418"
        fill="none" stroke="url(#colon)" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <text x="350" y="430" fill="#b0a595" font-size="9" font-style="italic">Sigmoid</text>
  <text x="350" y="442" fill="#b0a595" font-size="9" font-style="italic">colon</text>

  <!-- Rectum -->
  <rect x="320" y="448" width="22" height="30" rx="5" fill="url(#colon)" stroke="#c4b5a0" stroke-width="1" opacity="0.7"/>
  <text x="348" y="470" fill="#b0a595" font-size="9" font-style="italic">Rectum</text>

  <!-- ═══════════ BRAIN-GUT AXIS ═══════════ -->

  <!-- Brain -->
  <ellipse cx="250" cy="50" rx="36" ry="24" fill="#f0e6d3" stroke="#c4b5a0" stroke-width="1.5" opacity="0.85"/>
  <path d="M230,45 C235,38 245,34 250,34 C255,34 265,38 270,45" fill="none" stroke="#c4b5a0" stroke-width="1"/>
  <path d="M232,50 C238,46 245,45 250,45 C255,45 262,46 268,50" fill="none" stroke="#c4b5a0" stroke-width="1"/>
  <path d="M235,55 C240,52 246,50 250,50 C254,50 260,52 265,55" fill="none" stroke="#c4b5a0" stroke-width="0.8"/>
  <text x="250" y="44" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Brain</text>
  <text x="250" y="56" fill="#8a7e6e" font-size="8" text-anchor="middle">(CNS)</text>

  <!-- Brain-gut connection (vagus nerve) -->
  <path d="M235,68 C220,80 208,95 200,115 C192,135 190,155 195,175 C198,190 205,200 215,208 C220,212 225,214 230,215"
        fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M265,68 C278,80 288,95 296,115 C304,135 308,155 306,175 C303,195 296,208 286,218"
        fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="250" y="88" fill="#7f8c8d" font-size="8" text-anchor="middle">Vagus nerve</text>
  <text x="250" y="98" fill="#7f8c8d" font-size="8" text-anchor="middle">(bidirectional)</text>

  <!-- Enteric Nervous System label on the colon -->
  <text x="250" y="282" fill="#7f8c8d" font-size="8" font-weight="600" text-anchor="middle">Enteric Nervous System</text>
  <text x="250" y="293" fill="#7f8c8d" font-size="7" text-anchor="middle">"Second brain" ~500M neurons</text>

  <!-- ═══════════ PATHOPHYSIOLOGY INSETS ═══════════ -->

  <!-- Separator line -->
  <line x1="30" y1="480" x2="470" y2="480" stroke="#e0e0dc" stroke-width="1"/>

  <!-- Inset 1: Visceral hypersensitivity -->
  <g transform="translate(15, 488)">
    <rect x="0" y="0" width="150" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="75" y="18" fill="#c0392b" font-size="9" font-weight="600" text-anchor="middle">Visceral Hypersensitivity</text>
    <!-- Colon segment -->
    <path d="M30,50 C35,42 45,38 55,38 C65,38 72,42 75,45" fill="none" stroke="url(#colon)" stroke-width="6" stroke-linecap="round"/>
    <!-- Nerve with zigzag (pain signal) -->
    <path d="M55,48 C58,44 62,46 65,50 C68,54 70,50 72,52" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M72,52 L76,56 L73,59 L77,63" fill="none" stroke="#c0392b" stroke-width="1.2"/>
    <!-- Normal gas bubble -->
    <ellipse cx="55" cy="43" rx="4" ry="3" fill="#e6a817" opacity="0.4"/>
    <text x="75" y="65" fill="#8a7e6e" font-size="7" text-anchor="middle">Normal gas → pain signal</text>
    <text x="75" y="74" fill="#8a7e6e" font-size="7" text-anchor="middle">(allodynia)</text>
  </g>

  <!-- Inset 2: Altered motility -->
  <g transform="translate(175, 488)">
    <rect x="0" y="0" width="150" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="75" y="18" fill="#e6a817" font-size="9" font-weight="600" text-anchor="middle">Altered Motility</text>
    <!-- Colon tube -->
    <path d="M25,48 C35,38 50,42 60,48 C70,54 85,50 95,46 C105,42 115,44 125,48"
          fill="none" stroke="url(#colon)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <!-- Inconsistent contraction waves -->
    <path d="M30,48 C35,36 42,34 48,48" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
    <path d="M55,44 C60,34 65,34 70,44" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
    <path d="M80,50 C85,40 90,40 95,50" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.7"/>
    <path d="M100,48 C105,38 110,38 115,48" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
    <text x="75" y="65" fill="#8a7e6e" font-size="7" text-anchor="middle">Disorganized contractions</text>
    <text x="75" y="74" fill="#8a7e6e" font-size="7" text-anchor="middle">(too fast, too slow, erratic)</text>
  </g>

  <!-- Inset 3: Brain-gut axis dysregulation -->
  <g transform="translate(335, 488)">
    <rect x="0" y="0" width="150" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="75" y="18" fill="#7f8c8d" font-size="9" font-weight="600" text-anchor="middle">Brain-Gut Axis Disruption</text>
    <!-- Small brain -->
    <ellipse cx="50" cy="40" rx="14" ry="10" fill="#f0e6d3" stroke="#c4b5a0" stroke-width="1"/>
    <!-- Small gut -->
    <path d="M85,38 C90,34 100,34 105,38 C110,42 105,46 100,46 C95,46 90,44 88,46"
          fill="none" stroke="url(#colon)" stroke-width="4" stroke-linecap="round"/>
    <!-- Broken connection line -->
    <line x1="64" y1="38" x2="80" y2="42" stroke="#c0392b" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="64" y1="48" x2="80" y2="44" stroke="#c0392b" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="75" y="65" fill="#8a7e6e" font-size="7" text-anchor="middle">Impaired signaling</text>
    <text x="75" y="74" fill="#8a7e6e" font-size="7" text-anchor="middle">Pain amplification / stress</text>
  </g>

  <!-- ═══════════ SUBTYPE LABELS ═══════════ -->

  <!-- IBS-C label on descending colon -->
  <rect x="346" y="350" width="90" height="20" rx="4" fill="var(--surface, #fff)" stroke="#2d6a6e" stroke-width="0.8" opacity="0.85"/>
  <text x="391" y="363" fill="#2d6a6e" font-size="8" font-weight="600" text-anchor="middle">IBS-C: constipation</text>

  <!-- IBS-D label on ascending colon -->
  <rect x="94" y="355" width="82" height="20" rx="4" fill="var(--surface, #fff)" stroke="#2d6a6e" stroke-width="0.8" opacity="0.85"/>
  <text x="135" y="368" fill="#2d6a6e" font-size="8" font-weight="600" text-anchor="middle">IBS-D: diarrhea</text>

  <!-- Title -->
  <text x="250" y="18" fill="var(--text, #1a1a1a)" font-size="13" font-weight="700" text-anchor="middle">Irritable Bowel Syndrome — Gut Anatomy &amp; Mechanisms</text>
</svg>
