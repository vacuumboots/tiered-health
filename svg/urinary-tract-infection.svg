<svg class="anatomy-svg" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="organ" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#eddcc8"/></linearGradient>
    <linearGradient id="kidney" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e8ddd0"/><stop offset="100%" stop-color="#d4c8b8"/></linearGradient>
    <linearGradient id="bladder-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5e6d3"/><stop offset="100%" stop-color="#e8d5c0"/></linearGradient>
    <linearGradient id="infection" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <linearGradient id="vessel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0cfc0"/><stop offset="100%" stop-color="#d0bfb0"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.5"/></filter>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- ═══════════ BODY OUTLINE (torso silhouette) ═══════════ -->
  <path d="M160,30 C150,30 140,40 140,60 L140,120 C135,140 130,160 130,180 L130,320 C130,340 135,360 140,380 L150,410 C155,425 160,435 168,440 L180,445 C190,448 200,448 210,445 L220,442 C228,438 235,430 240,420 L250,400 C255,385 258,370 260,355 L265,330 L268,310 L270,290 L268,270 L265,250 L260,230 L255,210 L250,195 L248,180 L250,165 L258,150 L268,140 C275,135 280,125 282,110 L285,90 L285,70 C285,55 280,45 270,40 L260,35 L250,32 L240,32 L230,35 L220,38 L210,38 L200,36 L180,32 L170,30 Z"
        fill="url(#organ)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.15"/>

  <!-- ═══════════ RIGHT KIDNEY ═══════════ -->
  <g transform="translate(0, 0)">
    <ellipse cx="170" cy="145" rx="35" ry="22" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.8" transform="rotate(-15, 170, 145)"/>
    <!-- Renal pelvis (inner notch) -->
    <path d="M155,132 C160,128 168,128 175,132 C180,136 183,142 182,148 C180,155 175,160 168,160 C162,160 156,156 153,150 C150,144 150,138 155,132 Z"
          fill="#d4c0b0" stroke="#c4b5a0" stroke-width="0.8" opacity="0.6" transform="rotate(-15, 170, 145)"/>
    <!-- Kidney label -->
    <text x="130" y="128" fill="#b0a595" font-size="11" font-style="italic">Right</text>
    <text x="125" y="142" fill="#b0a595" font-size="11" font-style="italic">Kidney</text>
  </g>

  <!-- ═══════════ LEFT KIDNEY ═══════════ -->
  <g transform="translate(0, 0)">
    <ellipse cx="330" cy="145" rx="35" ry="22" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.8" transform="rotate(15, 330, 145)"/>
    <path d="M318,132 C323,128 332,128 338,132 C344,136 347,142 346,148 C344,155 338,160 330,160 C324,160 318,156 315,150 C312,144 312,138 318,132 Z"
          fill="#d4c0b0" stroke="#c4b5a0" stroke-width="0.8" opacity="0.6" transform="rotate(15, 330, 145)"/>
    <text x="338" y="128" fill="#b0a595" font-size="11" font-style="italic">Left</text>
    <text x="338" y="142" fill="#b0a595" font-size="11" font-style="italic">Kidney</text>
  </g>

  <!-- ═══════════ URETERS ═══════════ -->
  <!-- Right ureter (kidney → bladder) -->
  <path d="M185,158 C188,170 192,185 195,200 C198,215 200,230 200,245 C202,255 205,265 210,275 C215,285 218,290 220,295"
        fill="none" stroke="url(#vessel)" stroke-width="4" stroke-linecap="round" filter="url(#soft)"/>
  <text x="178" y="225" fill="#b0a595" font-size="9" font-style="italic">Ureter</text>

  <!-- Left ureter (kidney → bladder) -->
  <path d="M315,158 C312,170 308,185 305,200 C302,215 300,230 300,245 C298,255 295,265 290,275 C285,285 282,290 280,295"
        fill="none" stroke="url(#vessel)" stroke-width="4" stroke-linecap="round" filter="url(#soft)"/>
  <text x="310" y="225" fill="#b0a595" font-size="9" font-style="italic">Ureter</text>

  <!-- ═══════════ BLADDER ═══════════ -->
  <!-- Bladder body (dome shape) -->
  <ellipse cx="250" cy="340" rx="65" ry="45" fill="url(#bladder-grad)" stroke="#c4b5a0" stroke-width="1.5" opacity="0.85"/>
  <!-- Bladder wall highlight -->
  <path d="M200,315 C215,300 235,295 250,295 C270,295 290,305 300,320"
        fill="none" stroke="#dccfc0" stroke-width="1" opacity="0.6"/>

  <!-- Internal detail: trigone area -->
  <ellipse cx="250" cy="355" rx="30" ry="15" fill="none" stroke="#d0bfb0" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Bladder label -->
  <text x="195" y="298" fill="#8a7e6e" font-size="12" font-weight="600">Bladder</text>
  <text x="190" y="312" fill="#b0a595" font-size="9" font-style="italic">(urine storage)</text>

  <!-- ═══════════ URETHRA ═══════════ -->
  <!-- Urethra (female) -->
  <path d="M250,385 C248,398 246,410 245,425 C244,440 244,455 245,465 C246,475 248,480 250,482"
        fill="none" stroke="url(#vessel)" stroke-width="5" stroke-linecap="round" filter="url(#soft)"/>
  <!-- Internal urethral sphincter -->
  <ellipse cx="250" cy="388" rx="8" ry="3" fill="none" stroke="#c4b5a0" stroke-width="1" opacity="0.6"/>
  <!-- External sphincter (pelvic floor) -->
  <path d="M235,440 C240,435 260,435 265,440" fill="none" stroke="#c4b5a0" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="268" y="434" fill="#b0a595" font-size="8" font-style="italic">Pelvic floor</text>

  <!-- Urethra label -->
  <text x="262" y="405" fill="#8a7e6e" font-size="10" font-weight="600">Urethra</text>

  <!-- ═══════════ INFECTION / BACTERIA ═══════════ -->

  <!-- Bacteria in urethra (ascending) -->
  <circle cx="250" cy="460" r="4" fill="url(#infection)" opacity="0.8"/>
  <circle cx="242" cy="455" r="3" fill="url(#infection)" opacity="0.7"/>
  <circle cx="258" cy="455" r="3.5" fill="url(#infection)" opacity="0.7"/>
  <circle cx="248" cy="450" r="2.5" fill="url(#infection)" opacity="0.6"/>
  <circle cx="255" cy="462" r="3" fill="url(#infection)" opacity="0.65"/>

  <!-- Bacteria in bladder -->
  <circle cx="225" cy="350" r="4" fill="url(#infection)" opacity="0.8"/>
  <circle cx="260" cy="340" r="3.5" fill="url(#infection)" opacity="0.7"/>
  <circle cx="235" cy="365" r="3" fill="url(#infection)" opacity="0.7"/>
  <circle cx="270" cy="355" r="3.5" fill="url(#infection)" opacity="0.75"/>
  <circle cx="240" cy="335" r="2.5" fill="url(#infection)" opacity="0.6"/>
  <circle cx="275" cy="350" r="2.5" fill="url(#infection)" opacity="0.6"/>

  <!-- Inflammation lines in bladder -->
  <path d="M210,345 C215,340 218,342 215,348" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
  <path d="M278,345 C283,340 286,342 283,348" fill="none" stroke="#c0392b" stroke-width="1" opacity="0.5"/>

  <!-- Ascending infection arrow -->
  <path d="M270,485 C275,478 278,470 275,462 C272,454 268,450 265,448"
        fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="278" y="480" fill="#c0392b" font-size="9">Bacteria</text>
  <text x="278" y="492" fill="#c0392b" font-size="9">ascend</text>
  <text x="278" y="504" fill="#c0392b" font-size="9">urethra</text>

  <!-- Bacteria entry label at urethral opening -->
  <path d="M250,485 C255,490 260,492 270,490"
        fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- E. coli detail box (bottom left) -->
  <g transform="translate(30, 505)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="70" y="18" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">E. coli on bladder wall</text>
    <circle cx="35" cy="48" r="8" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="60" cy="48" r="8" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="85" cy="48" r="8" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="110" cy="48" r="8" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.7"/>
    <!-- Fimbriae (hair-like projections) on one bacterium -->
    <line x1="35" y1="42" x2="35" y2="35" stroke="#b0a595" stroke-width="0.8" opacity="0.6"/>
    <line x1="38" y1="40" x2="42" y2="34" stroke="#b0a595" stroke-width="0.8" opacity="0.6"/>
    <line x1="40" y1="42" x2="45" y2="37" stroke="#b0a595" stroke-width="0.8" opacity="0.6"/>
    <line x1="32" y1="42" x2="28" y2="36" stroke="#b0a595" stroke-width="0.8" opacity="0.6"/>
    <!-- Small red dots = infection -->
    <circle cx="35" cy="48" r="3" fill="url(#infection)" opacity="0.5"/>
    <circle cx="60" cy="48" r="3" fill="url(#infection)" opacity="0.5"/>
    <circle cx="85" cy="48" r="3" fill="url(#infection)" opacity="0.5"/>
    <circle cx="110" cy="48" r="3" fill="url(#infection)" opacity="0.5"/>
    <text x="70" y="70" fill="#8a7e6e" font-size="7" text-anchor="middle">Type 1 fimbriae adhere</text>
    <text x="70" y="79" fill="#8a7e6e" font-size="7" text-anchor="middle">to bladder lining</text>
  </g>

  <!-- Pyelonephritis inset (bottom right) -->
  <g transform="translate(330, 505)">
    <rect x="0" y="0" width="140" height="80" rx="6" fill="var(--surface, #fff)" stroke="var(--border, #e0e0dc)" stroke-width="1" opacity="0.9"/>
    <text x="70" y="18" fill="#8a7e6e" font-size="9" font-weight="600" text-anchor="middle">Pyelonephritis</text>
    <ellipse cx="50" cy="45" rx="20" ry="12" fill="url(#kidney)" stroke="#c4b5a0" stroke-width="0.8" opacity="0.7"/>
    <text x="50" y="42" fill="#c0392b" font-size="18" text-anchor="middle" opacity="0.6">⚠</text>
    <!-- Ascending bacteria from ureter into kidney -->
    <circle cx="42" cy="45" r="3" fill="url(#infection)" opacity="0.8"/>
    <circle cx="55" cy="40" r="2.5" fill="url(#infection)" opacity="0.7"/>
    <circle cx="48" cy="48" r="2.5" fill="url(#infection)" opacity="0.7"/>
    <path d="M50,57 C53,62 55,65 55,70" fill="none" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="50" y="72" fill="#8a7e6e" font-size="7" text-anchor="middle">Infection ascends</text>
  </g>

  <!-- Title -->
  <text x="250" y="24" fill="var(--text, #1a1a1a)" font-size="12" font-weight="700" text-anchor="middle">Urinary Tract Anatomy &amp; Infection Mechanism</text>
</svg>
